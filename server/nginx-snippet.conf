# Drop this inside the existing `server { ... }` block that serves
# /opt/funplaneviewer/index.html. Keeps the GUI on its current port and
# proxies only /api/uploads/ to the sidecar on 127.0.0.1:5174.
#
# Reload after editing:
#   sudo nginx -t && sudo systemctl reload nginx

location /api/uploads/ {
    proxy_pass http://127.0.0.1:5174;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Allow somewhat large backup uploads (default is 1m).
    client_max_body_size 16m;

    # Sidecar is a small Flask app on the same host; short timeouts are fine.
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
}

# Force browsers to revalidate index.html on every load. Without this,
# the "Update from GitHub" button replaces the file on disk but the
# browser still hands back its cached copy on reload, making the new
# version look like it didn't take.
location = / {
    add_header Cache-Control "no-cache, must-revalidate" always;
    add_header Pragma        "no-cache" always;
    expires off;
    try_files /index.html =404;
}

location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
    add_header Pragma        "no-cache" always;
    expires off;
}
